<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>grandtot.al — all answers billed at face value</title>
  <meta name="description" content="A scientific calculator where the answer is the price. All answers billed at face value.">
  <meta name="theme-color" content="#101014">
  <link rel="canonical" href="https://grandtot.al/">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="grandtot.al">
  <meta property="og:url" content="https://grandtot.al/">
  <meta property="og:title" content="grandtot.al">
  <meta property="og:description" content="All answers billed at face value.">
  <meta property="og:image" content="https://grandtot.al/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="grandtot.al — a calculator receipt reading 1.25 + 1.25 = $2.50">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="grandtot.al">
  <meta name="twitter:description" content="All answers billed at face value.">
  <meta name="twitter:image" content="https://grandtot.al/og.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calc">
    <header class="brand">grandtot<span class="tld">.al</span></header>
    <section class="screen">
      <div class="tape" id="tape"></div>
      <input class="display" id="display" inputmode="none" autocomplete="off" autocapitalize="off" spellcheck="false" maxlength="120" aria-label="Expression" placeholder="0">
    </section>
    <div class="status" id="status" role="status"></div>
    <div class="keys" id="keys">
      <div class="sci">
        <button class="key sci-key" data-insert="sin(">sin</button>
        <button class="key sci-key" data-insert="cos(">cos</button>
        <button class="key sci-key" data-insert="tan(">tan</button>
        <button class="key sci-key" data-insert="ln(">ln</button>
        <button class="key sci-key" data-insert="log(">log</button>
        <button class="key sci-key" data-insert="!">x!</button>
        <button class="key sci-key" data-insert="√(">√</button>
        <button class="key sci-key" data-insert="^">x^y</button>
        <button class="key sci-key" data-insert="(">(</button>
        <button class="key sci-key" data-insert=")">)</button>
        <button class="key sci-key" data-insert="π">π</button>
        <button class="key sci-key" data-insert="e">e</button>
      </div>
      <div class="main">
        <button class="key fn" data-action="clear" aria-label="Clear">C</button>
        <button class="key fn" data-action="backspace" aria-label="Backspace">⌫</button>
        <button class="key fn" data-action="ans" aria-label="Last purchased answer">ANS</button>
        <button class="key op" data-insert="÷" aria-label="Divide">÷</button>
        <button class="key" data-insert="7">7</button>
        <button class="key" data-insert="8">8</button>
        <button class="key" data-insert="9">9</button>
        <button class="key op" data-insert="×" aria-label="Multiply">×</button>
        <button class="key" data-insert="4">4</button>
        <button class="key" data-insert="5">5</button>
        <button class="key" data-insert="6">6</button>
        <button class="key op" data-insert="−" aria-label="Subtract">−</button>
        <button class="key" data-insert="1">1</button>
        <button class="key" data-insert="2">2</button>
        <button class="key" data-insert="3">3</button>
        <button class="key op" data-insert="+" aria-label="Add">+</button>
        <button class="key eq" data-action="equals" aria-label="Equals">=</button>
        <button class="key zero" data-insert="0">0</button>
        <button class="key" data-insert=".">.</button>
      </div>
    </div>
    <footer class="fine-print">All answers billed at face value. Payments by Stripe.</footer>
  </main>
  <footer class="footer">
    <div class="counter">
      <span class="counter-label" id="counter-label">Calculations</span>
      <span class="flaps" id="flaps" role="status" aria-labelledby="counter-label"></span>
    </div>
    <nav class="footer-links" aria-label="Site links">
      <a href="https://github.com/dubsector/grandtotal" rel="noopener">GitHub</a>
      <span class="dot" aria-hidden="true">·</span>
      <a href="https://dubsector.dev" rel="noopener">dubsector.dev</a>
    </nav>
  </footer>
  <script src="vendor/math.min.js"></script>
  <script src="calc.js"></script>
</body>
</html>
